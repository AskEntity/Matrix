<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>OpenGraft</title>
	<link rel="stylesheet" href="/web/style.css">
</head>
<body>
	<header>
		<div class="header-brand">
			<span class="brand-icon">⬡</span>
			<h1>OpenGraft</h1>
		</div>
		<div id="connection-status" class="status-dot disconnected" title="Disconnected"></div>
		<div class="header-center">
			<select id="project-select">
				<option value="">Select project...</option>
			</select>
			<button type="button" id="btn-init-project" title="Init project">+ Project</button>
			<button type="button" id="btn-delete-project" title="Delete project" class="btn-danger hidden">Delete</button>
		</div>
	</header>

	<main>
		<section id="task-panel">
			<div class="panel-header">
				<h2>Task Tree</h2>
				<div class="panel-actions">
					<button type="button" id="btn-add-task" title="Add task">+</button>
					<button type="button" id="btn-refresh" title="Refresh">&#x21bb;</button>
				</div>
			</div>
			<div id="task-tree"></div>
			<div id="no-tasks" class="empty-state">No tasks yet.<br>Start an orchestration to see the task tree.</div>
		</section>

		<section id="right-panel">
			<!-- Activity log takes full width now -->
			<div id="activity-section">
				<div class="panel-header">
					<h2>Agent Activity</h2>
					<div class="panel-actions">
						<button type="button" id="btn-clear-log" title="Clear log">&#x2715;</button>
						<label class="autoscroll-label">
							<input type="checkbox" id="auto-scroll" checked>
							<span>Auto-scroll</span>
						</label>
					</div>
				</div>
				<div id="activity-log"></div>
				<form id="inject-form">
					<input type="text" id="inject-input" placeholder="Send instruction to running agent..." autocomplete="off" disabled>
					<button type="submit" id="btn-inject" disabled>Send</button>
				</form>
			</div>
		</section>
	</main>

	<footer>
		<form id="orchestrate-form">
			<div class="footer-input-wrap">
				<input type="text" id="prompt-input" placeholder="Describe what to build..." autocomplete="off">
			</div>
			<div class="footer-controls">
				<div class="model-selector-group">
					<label class="model-label" for="model-select">Orchestrator</label>
					<select id="model-select" title="Orchestrator model">
						<option value="">Default</option>
						<option value="claude-sonnet-4-6">Sonnet</option>
						<option value="claude-opus-4-6">Opus</option>
						<option value="claude-haiku-4-5-20251001">Haiku</option>
					</select>
				</div>
				<div class="model-selector-group">
					<label class="model-label" for="child-model-select">Child Agent</label>
					<select id="child-model-select" title="Child agent model">
						<option value="">Default</option>
						<option value="claude-sonnet-4-6">Sonnet</option>
						<option value="claude-opus-4-6">Opus</option>
						<option value="claude-haiku-4-5-20251001">Haiku</option>
					</select>
				</div>
				<button type="submit" id="btn-orchestrate">Orchestrate</button>
				<button type="button" id="btn-stop" class="btn-danger hidden">Stop</button>
			</div>
		</form>
		<div id="cost-display"></div>
	</footer>

	<!-- Task detail slide-out overlay (position: fixed) -->
	<div id="task-detail" class="hidden">
		<div class="detail-overlay-backdrop"></div>
		<div class="detail-overlay-panel">
			<div class="panel-header">
				<h2 id="detail-title">Task Detail</h2>
				<div class="panel-actions">
					<button type="button" id="btn-close-detail" title="Close">&#x2715;</button>
				</div>
			</div>
			<div id="detail-content">
				<div id="detail-status" class="detail-field"></div>
				<div id="detail-description" class="detail-field"></div>
				<div id="detail-branch" class="detail-field"></div>
				<div id="detail-worktree" class="detail-field"></div>
				<div id="detail-session" class="detail-field"></div>
				<div id="detail-updated" class="detail-field"></div>
				<div id="detail-message" class="detail-field"></div>
			</div>
			<div id="detail-log-section">
				<div class="detail-label">Agent Output</div>
				<div id="detail-log"></div>
			</div>
			<div id="detail-actions">
				<form id="continue-form" class="hidden">
					<input type="text" id="continue-input" placeholder="Instructions for the agent..." autocomplete="off">
					<button type="submit" id="btn-continue">Continue</button>
				</form>
				<button type="button" id="btn-delete-task" class="btn-danger">Delete Task</button>
			</div>
		</div>
	</div>

	<script type="module" src="/web/app.js"></script>
</body>
</html>
